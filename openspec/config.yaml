schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  Tech stack: Bun, TypeScript
  Coding Guidelines:
    - Single-file organization: Each package's core logic resides in a single `main.ts` file
    - Code sections: Use `// === SECTION: Name ===` comments to organize code by dependency order
    - Explicit exports: `index.ts` explicitly manages Public API and Internal API exports
    - No utils directory: All code in `main.ts`, organized by sections instead of separate files
    - Unit tests: Implement in `tests/` directory within each package
    - Focus on high performance, leveraging Bun's native APIs
    - Use Pascal naming convention strictly

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
