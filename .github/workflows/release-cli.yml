name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            arch: x64
          - os: ubuntu-latest
            target: linux-arm64
            arch: aarch64
          - os: macos-latest
            target: darwin-x64
            arch: x64
          - os: macos-latest
            target: darwin-arm64
            arch: aarch64
          - os: windows-latest
            target: windows-x64
            arch: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.2'

      - name: Install dependencies
        run: bun install

      - name: Verify packages/ai exists
        run: test -d packages/ai && test -f packages/ai/package.json || (echo "packages/ai is required for AI resources" && exit 1)

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Prebuild registry
        working-directory: packages/cli
        env:
          RAVEN_VERSION: ${{ steps.version.outputs.version }}
        run: bun run prebuild

      - name: Build binary (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: packages/cli
        run: |
          bun build ./index.ts --compile --minify --outfile raven-${{ steps.version.outputs.version }}-${{ matrix.target }}

      - name: Build binary (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: packages/cli
        run: |
          bun build ./index.ts --compile --minify --outfile raven-${{ steps.version.outputs.version }}-${{ matrix.target }}.exe

      - name: Create platform package (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: packages/cli
        run: |
          mkdir -p ../../artifact-dir
          bun run scripts/create-platform-package.ts ${{ matrix.target }} ${{ steps.version.outputs.version }} raven-${{ steps.version.outputs.version }}-${{ matrix.target }} ../../artifact-dir

      - name: Create platform package (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: packages/cli
        run: |
          mkdir -p ../../artifact-dir
          bun run scripts/create-platform-package.ts ${{ matrix.target }} ${{ steps.version.outputs.version }} raven-${{ steps.version.outputs.version }}-${{ matrix.target }}.exe ../../artifact-dir

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target }}
          path: artifact-dir/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "npm_tag=--tag next" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "npm_tag=" >> $GITHUB_OUTPUT
          fi

      - name: Download all platform packages
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: package-*
          merge-multiple: false

      - name: Debug - list downloaded artifacts
        run: |
          echo "=== dist-artifacts directory ==="
          ls -la dist-artifacts/
          echo "=== Each artifact contents ==="
          for dir in dist-artifacts/*; do
            if [ -d "$dir" ]; then
              echo "--- $dir ---"
              ls -la "$dir"/
            fi
          done

      - name: Merge artifacts into dist
        run: |
          mkdir -p dist
          for dir in dist-artifacts/package-*; do
            if [ -d "$dir" ]; then
              echo "Copying contents of $dir to dist/"
              cp -r "$dir"/* dist/
            fi
          done
          echo "=== dist directory after merge ==="
          ls -la dist/

      - name: Create main package
        working-directory: packages/cli
        run: |
          bun run scripts/create-main-package.ts ${{ steps.version.outputs.version }} ../../dist

      - name: Publish platform packages
        working-directory: dist
        run: |
          ls -la
          for dir in @raven.js-cli-*; do
            if [ -d "$dir" ]; then
              echo "Publishing $dir"
              cd "$dir"
              npm publish --access public ${{ steps.version.outputs.npm_tag }} --provenance
              cd ..
            fi
          done

      - name: Publish main package
        working-directory: dist/@raven.js-cli
        run: npm publish --access public ${{ steps.version.outputs.npm_tag }} --provenance
