name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.2"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"-"* ]]; then
            echo "npm_tag=--tag next" >> $GITHUB_OUTPUT
          else
            echo "npm_tag=" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        working-directory: packages/cli
        run: bun run build

      - name: Build install-raven
        working-directory: packages/install-raven
        run: bun run build

      - name: Publish CLI to npm
        working-directory: packages/cli
        run: bun publish --access public ${{ steps.version.outputs.npm_tag }} --provenance

      - name: Publish install-raven to npm
        working-directory: packages/install-raven
        run: bun publish --access public ${{ steps.version.outputs.npm_tag }} --provenance
