name: Release Core

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # required for npm provenance
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "npm_tag=--tag next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./packages/core/package.json').version")"
          if [[ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "Tag version ${{ steps.version.outputs.version }} does not match packages/core version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Publish @raven.js/core to npm
        working-directory: packages/core
        run: npm publish --access public ${{ steps.version.outputs.npm_tag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
